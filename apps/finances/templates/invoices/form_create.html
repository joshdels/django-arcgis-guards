<form class="standard-form"
      action="{% url 'finances:invoice_create' %}"
      method="post">
    {% csrf_token %}
    <div class="deployment-card">
        <div class="form-group">
            <label for="{{ form.billing.id_for_label }}">Billing</label>
            {{ form.billing }}
            {{ form.billing.errors }}
        </div>
        <div class="form-group">
            <label for="{{ form.due_date.id_for_label }}">Due Date</label>
            {{ form.due_date }}
            {{ form.due_date.errors }}
        </div>
        {% if form.status %}
            <div class="form-group">
                <label for="{{ form.status.id_for_label }}">Status</label>
                {{ form.status }}
                {{ form.status.errors }}
            </div>
        {% endif %}
        <div class="form-group">
            <label for="{{ form.remarks.id_for_label }}">Remarks</label>
            {{ form.remarks }}
            {{ form.remarks.errors }}
        </div>
    </div>
    <div class="form-button">
        <calcite-button id="backButton1" appearance="outline-fill">Cancel</calcite-button>
        <calcite-button type="submit">Save Invoice</calcite-button>
    </div>
</form>
