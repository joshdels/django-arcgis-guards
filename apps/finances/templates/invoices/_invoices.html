<main class="dashboard">
    <h1>Invoices</h1>
    <header class="header">
        <div>
            <form method="get" class="flex">
                <input type="hidden" name="status" value="{{ status|default:'' }}">
                <input type="hidden" name="filter" value="{{ filter|default:'' }}">
                <calcite-input type="search" name="search" placeholder="Client Name, Organization" icon="search" value="{{ search|default:'' }}">
                </calcite-input>
                <calcite-button type="submit">Search</calcite-button>
            </form>
            <a href="?search={{ search|default:'' }}"
            class="{% if not status %}active{% endif %}">
                All
            </a>

            <a href="?search={{ search|default:'' }}&status=draft"
            class="{% if status == 'draft' %}active{% endif %}">
                Draft
            </a>

            <a href="?search={{ search|default:'' }}&status=paid"
            class="{% if status == 'paid' %}active{% endif %}">
                Paid
            </a>

            <a href="?search={{ search|default:'' }}&status=unpaid"
            class="{% if status == 'unpaid' %}active{% endif %}">
                Unpaid
            </a>

            <a href="?search={{ search|default:'' }}&status=overdue"
            class="{% if status == 'overdue' %}active{% endif %}">
                Overdue
            </a>

            <a href="?search={{ search|default:'' }}&status=cancelled"
            class="{% if status == 'cancelled' %}active{% endif %}">
                Cancelled
            </a>
        </div>
        <calcite-button href="{% url 'finances:invoice_create' %}"  icon-start="plus">Manual Invoice</calcite-button>
    </header>
    {% include 'invoices/tables.html' %}
</main>
