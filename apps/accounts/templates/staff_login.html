<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Staff Login</title>
    </head>
    <body>
        <h1>Staff Portal</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div>
                <label>Username</label>
                {{ form.username }}
            </div>
            <div>
                <label>Password</label>
                {{ form.password }}
            </div>
            <button type="submit">Login</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </body>
</html>
