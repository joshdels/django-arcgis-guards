<form action="{% url 'agency:guard_create' %}" method="post">
  {% csrf_token %}
  <div class="form-group">
      <label for="{{ form.badge_number.id_for_label }}">Badge Number</label>
      {{ form.badge_number }}
      {{ form.badge_number.errors }}
  </div>

  <div class="form-group">
      <label for="{{ form.hourly_pay_rate.id_for_label }}">Hourly Pay Rate</label>
      {{ form.hourly_pay_rate }}
      {{ form.hourly_pay_rate.errors }}
  </div>

    <div class="form-group">
      <label for="{{ form.phone_number.id_for_label }}">Phone Number</label>
      {{ form.phone_number }}
      {{ form.phone_number.errors }}
  </div>

  <div class="form-group">
      <label for="{{ form.address.id_for_label }}">Address</label>
      {{ form.address }}
      {{ form.address.errors }}
  </div>
    <calcite-button href="{% url 'agency:show_guards' %}" appearance="outline-fill">Cancel</calcite-button>
    <calcite-button type="submit">Save Guard</calcite-button>
</form>
