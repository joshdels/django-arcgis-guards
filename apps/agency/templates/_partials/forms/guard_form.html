<form class="standard-form"
      action="{% if guard %}{% url 'agency:guard_update' guard.id %}{% else %}{% url 'agency:guard_create' %}{% endif %}"
      method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="{{ form.first_name.id_for_label }}">First Name</label>
        {{ form.first_name }}
        {{ form.first_name.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.middle_name.id_for_label }}">Middle Name</label>
        {{ form.middle_name }}
        {{ form.middle_name.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.last_name.id_for_label }}">Last Name</label>
        {{ form.last_name }}
        {{ form.last_name.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.phone_number.id_for_label }}">Phone Number</label>
        {{ form.phone_number }}
        {{ form.phone_number.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.address.id_for_label }}">Address</label>
        {{ form.address }}
        {{ form.address.errors }}
    </div>
    <div class="form-button">
        <calcite-button id="backButton" appearance="outline-fill">Cancel</calcite-button>
        <calcite-button type="submit">Save Guard</calcite-button>
    </div>
</form>
