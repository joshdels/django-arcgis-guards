{% load humanize %}
<div class="overview-container">
    <div class="dashboard-card">
        <p>Active Contracts</p>
        <h1>
            <calcite-icon icon="files"></calcite-icon>
            {{ active_contracts|intcomma|default:"0" }}
        </h1>
    </div>
    <div class="dashboard-card">
        <p>Active Deployments</p>
        <h1>
            <calcite-icon icon="check-circle"></calcite-icon>
            {{ active_deployments|intcomma|default:"0" }}
        </h1>
    </div>
    <div class="dashboard-card">
        <p>Guards Assigned</p>
        <h1>
            <calcite-icon icon="users"></calcite-icon>
            {{ guards_assigned|intcomma|default:"0" }}
        </h1>
    </div>
    <div class="dashboard-card">
        <p>Vacant Posts</p>
        <h1>
            <calcite-icon icon="user-plus"></calcite-icon>
            {{ vacant_posts|intcomma|default:"0" }}
        </h1>
    </div>
</div>
