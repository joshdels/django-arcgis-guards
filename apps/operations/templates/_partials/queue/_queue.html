<div class="dashboard">
    <h1>Approved Contract</h1>
    <header class="header">
        <div>
            <form method="get" class="flex">
                <calcite-input type="search" name="search" placeholder="Contract Number, Company Name" icon="search" value="{{ search|default:'' }}">
                </calcite-input>
                <calcite-button type="submit">Search</calcite-button>
            </form>
            <a href="{% url 'operations:operation_queue' %}"
               class="{% if not status %}clear{% endif %}">Reset</a>
        </div>
        <calcite-button href="{% url 'agency:contract_create' %}"  icon-start="plus">Add Contract</calcite-button>
    </header>
    {% include "_partials/queue/table.html" %}
</div>
