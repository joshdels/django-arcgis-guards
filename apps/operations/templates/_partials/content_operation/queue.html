<h2>Deployment Queue</h2>

<table>
  <thead>
    <tr>
      <th>Contract</th>
      <th>Client</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>

  <tbody>
    {% for contract in contracts %}

    <tr>
      <td>{{ contract.contract_number }}</td>
      <td>{{ contract.client.name }}</td>
      <td>{{ contract.get_status_display }}</td>

      <td>
        <a href="#"> Create Deployment </a>
      </td>
    </tr>

    {% empty %}

    <tr>
      <td colspan="4">No contracts ready for deployment.</td>
    </tr>

    {% endfor %}
  </tbody>
</table>
