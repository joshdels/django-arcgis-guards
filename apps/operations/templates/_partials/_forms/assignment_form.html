<div class="deployment-card">
    {% if deployment %}
        <div class="form-group">
            <label>Contract</label>
            <calcite-input value="{{ deployment.name }} - {{ deployment.contract.client }}" disabled>
            </calcite-input>
        </div>
    {% else %}

    <div class="form-group">
        <label for="{{ form.deployment.id_for_label }}">Deployment</label>
        {{ form.deployment }}
        {{ form.deployment.errors }}
    </div>
    {% endif %}
    <div class="form-group">
        <label for="{{ form.guard.id_for_label }}">Guard</label>
        {{ form.guard }}
        {{ form.guard.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.start_date.id_for_label }}">Start Date</label>
        {{ form.start_date }}
        {{ form.start_date.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.end_date.id_for_label }}">End Date</label>
        {{ form.end_date }}
        {{ form.end_date.errors }}
    </div>
</div>
