<form class="standard-form"
      method="post"
      action="{% url 'operations:assignment_edit_view' assignment.pk %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="{{ form.deployment.id_for_label }}">Deployment</label>
        {{ form.deployment }}
        {{ form.deployment.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.guard.id_for_label }}">Guard</label>
        {{ form.guard }}
        {{ form.guard.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.start_date.id_for_label }}">Start Date</label>
        {{ form.start_date }}
        {{ form.start_date.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.end_date.id_for_label }}">End Date</label>
        {{ form.end_date }}
        {{ form.end_date.errors }}
    </div>
    <div class="form-group">
        <label for="{{ form.status.id_for_label }}">Status</label>
        {{ form.status }}
        {{ form.status.errors }}
    </div>
    <div class="form-button">
        <calcite-button type="submit">
        Save Assignment
        </calcite-button>
    </div>
</form>
