{% extends '_base.html' %}
{% load static %}

{% block title %}Agency | Guards{% endblock %}

{% block extra_head %} 
  <link rel="stylesheet" href="{% static 'css/_agency_page.css' %}">{% endblock %}   
{% block content %}

<h1 class="container-navbar">Agency Dashboard</h1>

<section class="dashboard container">

  <a href="{% url 'client-page' %}" class="dashboard-card">
      <calcite-icon
        slot="thumbnail"
        icon="organization"
        scale="l">
      </calcite-icon>

      <h2>Clients</h2>
      <p>
        View and manage all client companies.
      </p>
  </a>

  <a href="{% url 'guard-page' %}" class="dashboard-card">
      <calcite-icon
        icon="address-book"
        scale="l">
      </calcite-icon>

      <h2>Guards</h2>
      <p>
        View and manage all guards.
      </p>
  </a>

</section>

{% endblock %}
